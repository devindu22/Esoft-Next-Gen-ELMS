        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

        .stagger-1 { animation-delay: 100ms; }
        .stagger-2 { animation-delay: 200ms; }
        .stagger-3 { animation-delay: 300ms; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }

        function toggleModal(modalName) {
            Object.keys(state.modals).forEach(k => {
                if(k !== modalName) state.modals[k] = false;
            });
            state.modals[modalName] = !state.modals[modalName];
            render();
        }

        function closeAllModals() {
            state.modals = { notifications: false, profile: false, ai: false, editProfile: false, submission: false };
            render();
        }

        function navigate(view, params = {}) {
            closeAllModals();
            const app = document.getElementById('app');
            app.classList.remove('animate-fade-in');
            void app.offsetWidth; // Trigger reflow layout rendering
            app.classList.add('animate-fade-in');
            
            state.view = view;
            if(params.courseId) state.activeCourseId = params.courseId;
            if(params.module) state.activeModule = params.module;
            
            render();
        }

        function updateProfile(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            state.student.name = formData.get('studentName');
            state.student.phone = formData.get('studentPhone');
            state.student.email = formData.get('studentEmail');
            
            // Set initials
            const initials = state.student.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
            state.student.avatarInitials = initials;
            
            state.modals.editProfile = false;
            render();
        }

        function markAllNotificationsRead() {
            state.notifications.forEach(n => n.read = true);
            render();
        }

        function handleSendChatMessage() {
            const input = document.getElementById('ai-chat-input');
            const val = input.value.trim();
            if(!val) return;

            state.aiChat.push({ sender: 'user', text: val });
            input.value = '';
            render();

            // Auto simulated smart response matching keywords
            setTimeout(() => {
                let reply = "I'm processing your query with our study guides. For specific subject matter, please review Chapter slides inside your active course module space.";
                const lower = val.toLowerCase();
                if(lower.includes('python') || lower.includes('assignment')) {
                    reply = "You have an assignment for Python stage 3 coming up. The submission link is now open under Stage 3 modules!";
                } else if(lower.includes('fee') || lower.includes('payment') || lower.includes('lkr')) {
                    reply = "Your next installment of LKR 25,000 is due on October 25th. You can pay directly from the Financials dashboard.";
                } else if(lower.includes('exam') || lower.includes('result')) {
                    reply = "Your results are ready for Level 3. Your cumulative GPA is currently 3.8! Exceptional work!";
                }
                state.aiChat.push({ sender: 'bot', text: reply });
                render();
                // Scroll chat container to bottom
                const chatContainer = document.getElementById('chat-msg-container');
                if(chatContainer) chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 1000);
        }

        function triggerSubmissionModal(assignmentName) {
            state.activeSubmissionTarget = assignmentName;
            if(!state.submissions[assignmentName]) {
                state.submissions[assignmentName] = { status: 'Not Submitted', file: null, date: null, progress: 0, uploading: false };
            }
            state.modals.submission = true;
            render();
        }

        function simulateFileUpload() {
            const fileInput = document.getElementById('portal-file-picker');
            if(!fileInput || !fileInput.files.length) return;
            
            const file = fileInput.files[0];
            const target = state.activeSubmissionTarget;
            
            // Plagiarism declaration checkbox validator
            const declaration = document.getElementById('declaration-check');
            if(declaration && !declaration.checked) {
                alert("Please agree to the Academic Honesty Declaration before uploading.");
                return;
            }

            state.submissions[target].uploading = true;
            state.submissions[target].progress = 10;
            render();

            // Smooth uploading progress intervals
            const interval = setInterval(() => {
                if(state.submissions[target].progress < 90) {
                    state.submissions[target].progress += 20;
                    render();
                } else {
                    clearInterval(interval);
                    state.submissions[target].progress = 100;
                    state.submissions[target].uploading = false;
                    state.submissions[target].status = 'Submitted';
                    state.submissions[target].file = file.name;
                    state.submissions[target].date = new Date().toLocaleString();
                    render();
                }
            }, 300);
        }

        function deleteSubmission(assignmentName) {
            if(confirm("Are you sure you want to delete this submission? This will revoke your turned-in assessment.")) {
                state.submissions[assignmentName] = { status: 'Not Submitted', file: null, date: null, progress: 0, uploading: false };

        function changeCalendarMonth(delta) {

                case 'payments': app.innerHTML = renderLayout(renderPaymentsView()); break;
                case 'results': app.innerHTML = renderLayout(renderResultsView()); break;

                                <div class="flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:shadow-md transition-shadow">
                                    <span class="font-extrabold text-slate-700">IT Concepts</span>
                                    <span class="w-10 h-10 bg-blue-50 text-esoft-blue rounded-lg flex items-center justify-center font-black text-lg">A+</span>
                                </div>
                                <div class="flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:shadow-md transition-shadow">
                                    <span class="font-extrabold text-slate-700">MS Office Productivity</span>
                                    <span class="w-10 h-10 bg-blue-50 text-esoft-blue rounded-lg flex items-center justify-center font-black text-lg">A</span>
                                </div>
                                <div class="flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:shadow-md transition-shadow">
                                    <span class="font-extrabold text-slate-700">Computer Hardware</span>
                                    <span class="w-10 h-10 bg-blue-50 text-esoft-blue rounded-lg flex items-center justify-center font-black text-lg">A-</span>
                                </div>
                                <div class="flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:shadow-md transition-shadow">
                                    <span class="font-extrabold text-slate-700">Network Technology</span>
                                    <span class="w-10 h-10 bg-green-50 text-green-600 rounded-lg flex items-center justify-center font-black text-lg">B+</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEventItem(day, month, title, time, colorType) {
            const colors = {
                blue: 'bg-blue-50 text-blue-600 border-blue-200 shadow-blue-100',
                red: 'bg-red-50 text-red-600 border-red-200 shadow-red-100',
                green: 'bg-green-50 text-green-600 border-green-200 shadow-green-100',
                purple: 'bg-purple-50 text-purple-600 border-purple-200 shadow-purple-100'
            };
            const c = colors[colorType] || colors.blue;
            
            return `
                <div class="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 transition-colors cursor-pointer group border border-transparent hover:border-slate-200">
                    <div class="flex flex-col items-center justify-center w-14 h-14 rounded-2xl border bg-white ${c.split(' ')[1]} ${c.split(' ')[2]} font-black shadow-sm group-hover:scale-105 transition-transform">
                        <span class="text-[10px] uppercase tracking-wider mb-0.5">${month}</span>
                        <span class="text-xl leading-none">${day}</span>
                    </div>
                    <div>
                        <h4 class="font-extrabold text-slate-800 group-hover:text-esoft-blue transition-colors text-sm">${title}</h4>
                        <p class="text-[11px] text-slate-500 font-semibold flex items-center gap-1 mt-0.5"><i data-lucide="clock" class="w-3 h-3"></i> ${time}</p>
                    </div>
                </div>
            `;
        }

        window.onload = () => {
            render();
        };
    </script>
